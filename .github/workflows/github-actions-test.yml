name: GitHub Actions test
on:
  push:
    branches: [master]
  pull_request:
jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@v2
    - name: Install clang-format
      run: sudo apt-get update && sudo apt-get install -y clang-format
    - name: Check formatting
      run: ./scripts/format.sh --check

  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@v2
      with:
        submodules: 'recursive'
    - name: Run tests
      run: ./scripts/test.sh

  build:
    needs: [format-check, test]
    runs-on: ubuntu-latest
    container: espressif/idf:v6.0.1
    strategy:
      fail-fast: false
      matrix:
        board: [wave_4b, wave_35, wave_5, crowpanel_101]
    name: build (${{ matrix.board }})
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
    - name: Build (${{ matrix.board }})
      run: |
        git config --global --add safe.directory "$GITHUB_WORKSPACE"
        . $IDF_PATH/export.sh
        idf.py -B build_${{ matrix.board }} \
               -D SDKCONFIG=build_${{ matrix.board }}/sdkconfig \
               -D 'SDKCONFIG_DEFAULTS=sdkconfig.defaults;sdkconfig.defaults.${{ matrix.board }}' \
               build all size-components size
    - name: Stage flashable firmware (${{ matrix.board }})
      run: |
        STAGE="firmware_${{ matrix.board }}"
        BUILD="build_${{ matrix.board }}"
        mkdir -p "$STAGE"
        cp "$BUILD"/bootloader/bootloader.bin "$STAGE"/
        cp "$BUILD"/partition_table/partition-table.bin "$STAGE"/
        cp "$BUILD"/flasher_args.json "$STAGE"/
        cp "$BUILD"/flash_args "$STAGE"/ 2>/dev/null || true
        cp "$BUILD"/*.bin "$STAGE"/ 2>/dev/null || true
        cp "$BUILD"/*.elf "$STAGE"/ 2>/dev/null || true
        cp "$BUILD"/*.map "$STAGE"/ 2>/dev/null || true
    - name: Upload firmware artifact (${{ matrix.board }})
      uses: actions/upload-artifact@v4
      with:
        name: firmware-${{ matrix.board }}
        path: firmware_${{ matrix.board }}/
        if-no-files-found: error
        retention-days: 30

  screenshots:
    needs: [format-check, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
    - name: Install simulator dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential libsdl2-dev libmbedtls-dev
    - name: Build simulator and capture screenshots for all boards
      run: |
        mkdir -p screenshots
        for board in wave_4b wave_35 wave_5 crowpanel_101; do
          case $board in
            wave_35)       W=320;  H=480  ;;
            wave_5)        W=720;  H=1280 ;;
            crowpanel_101) W=1024; H=600  ;;
            *)             W=720;  H=720  ;;
          esac
          echo "Building simulator for $board (${W}x${H})..."
          cmake -B "simulator/build_${board}" -S simulator \
            -DCMAKE_BUILD_TYPE=Release \
            -DSIM_BOARD="$board" \
            -DSIM_LCD_H_RES="$W" \
            -DSIM_LCD_V_RES="$H"
          cmake --build "simulator/build_${board}" -- -j$(nproc)
          echo "Taking screenshot tour for $board..."
          mkdir -p "screenshots/${board}_${W}x${H}"
          SDL_VIDEODRIVER=offscreen SDL_RENDER_DRIVER=software \
          "simulator/build_${board}/kern_simulator" \
            --screenshot-tour "screenshots/${board}_${W}x${H}"
        done
    - name: Upload UI screenshots
      uses: actions/upload-artifact@v4
      with:
        name: ui-screenshots
        path: screenshots/
        retention-days: 30
  deploy-flasher:
    needs: [build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Checkout flasher sources
      uses: actions/checkout@v4
    - name: Download wave_4b firmware
      uses: actions/download-artifact@v4.1.3
      with:
        name: firmware-wave_4b
        path: flasher/firmware/wave_4b
    - name: Download wave_35 firmware
      uses: actions/download-artifact@v4.1.3
      with:
        name: firmware-wave_35
        path: flasher/firmware/wave_35
    - name: Download wave_5 firmware
      uses: actions/download-artifact@v4.1.3
      with:
        name: firmware-wave_5
        path: flasher/firmware/wave_5
    - name: Download crowpanel_101 firmware
      uses: actions/download-artifact@v4.1.3
      with:
        name: firmware-crowpanel_101
        path: flasher/firmware/crowpanel_101
    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: flasher/
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
